<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>World Roulette</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:black;
}

#map{
  width:100%;
  height:100%;
  background:lightblue;
}

#btn{
  position:absolute;
  top:20px;
  right:20px;
  z-index:1000;
  padding:12px 20px;
  font-size:20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

#country{
  position:absolute;
  top:80px;
  right:20px;
  z-index:1000;
  color:white;
  font-size:40px;
  font-weight:bold;
  text-shadow:0 0 10px black;
}

#count{
  position:absolute;
  top:40%;
  width:100%;
  text-align:center;
  font-size:150px;
  color:white;
  z-index:1000;
  pointer-events:none;
  opacity:0.5;
}

.leaflet-container{
  background:black;
}

.leaflet-interactive{
  transition:0.1s;
}
</style>
</head>

<body>

<div id="map"></div>
<button id="btn">PUSH</button>
<div id="country"></div>
<div id="count"></div>

<script>

// 地図
const map = L.map('map',{
  zoomControl:false,
  attributionControl:false
}).setView([20,0],2);

// 高精細な国境データ
fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
.then(res=>res.json())
.then(data=>{

  let layers=[];
  let remainingLayers=[];

  const geo = L.geoJSON(data,{

    style:{
      color:"#555",
      weight:0.5,
      fillColor:"#666",
      fillOpacity:1
    },

    onEachFeature:(feature,layer)=>{

      // 名前がある国だけ登録
      if(feature.properties.name){
        layers.push(layer);
      }

    }

  }).addTo(map);

  remainingLayers=[...layers];

  const btn=document.getElementById("btn");
  const country=document.getElementById("country");
  const count=document.getElementById("count");

  btn.onclick=()=>{

    // 世界全体へ戻る（滑らか）
    map.setView([20,0],2);

    btn.disabled=true;

    country.innerText="";

    let currentLayer=null;

    // ルーレット
    const interval=setInterval(()=>{

      geo.eachLayer(l=>{
        l.setStyle({
          fillColor:"#666"
        });
      });

      const randomIndex =
Math.floor(Math.random()*remainingLayers.length);

currentLayer =
remainingLayers[randomIndex];

      // 念のため
      if(!currentLayer) return;

      currentLayer.setStyle({
        fillColor:"red"
      });

    },80);

    // 2秒後停止
    setTimeout(()=>{

      clearInterval(interval);

      remainingLayers =
remainingLayers.filter(l => l !== currentLayer);

if(remainingLayers.length===0){
  remainingLayers=[...layers];
}

      // currentLayer が無い時対策
      if(!currentLayer){
        btn.disabled=false;
        return;
      }

      // 国へ滑らかズーム
      map.fitBounds(
        currentLayer.getBounds(),
        {
          padding:[190,190],
          duration:10
        }
      );

      const englishName =
currentLayer.feature.properties.name;

const countryJP = {

  "Japan":"日本",
  "United States of America":"アメリカ合衆国",
  "China":"中国",
  "Russian Federation":"ロシア",
  "Republic of Korea":"韓国",
  "Democratic People's Republic of Korea":"北朝鮮",
  "India":"インド",
  "Brazil":"ブラジル",
  "Canada":"カナダ",
  "Australia":"オーストラリア",
  "France":"フランス",
  "Germany":"ドイツ",
  "United Kingdom":"イギリス",
  "Italy":"イタリア",
  "Spain":"スペイン",
  "Trinidad and Tobago":"トリニダード・トバゴ",
  "Liechtenstein":"リヒテンシュタイン",
  "French Southern and Antarctic Lands":"フランス領南方南極地域",
  "Seychelles":"セーシェル",
  "Guam":"グアム",
  "Benin":"ベナン",
  "Haiti":"ハイチ",
  "Antarctic":"南極",
  "Costa Rica":"コスタリカ",
  "Uruguay":"ウルグアイ",
  "Pakistan":"パキスタン",
  "Tonga":"トンガ",
  "Cyprus No Mans Area":"国連キプロス緩衝地帯(グリーンライン)",
  "Sierra Leone":"シエラレオネ",
  "Barbados":"バルバドス",
  "Bahrain":"バーレーン",
  "Jersey":"イギリス王室属領ジャージー",
  "Niger":"ニジェール",
  "Hungary":"ハンガリー",
  "Austria":"オーストリア",
  "Singapore":"シンガポール",
  

};

const name =
countryJP[englishName] || englishName;
      
      let sec=5;

      count.innerText=sec;

      const cd=setInterval(()=>{

        sec--;

        if(sec<=0){

          clearInterval(cd);

          count.innerText="";
          country.innerText=name;

          btn.disabled=false;

          return;
        }

        count.innerText=sec;

      },1000);

    },2000);

  };

});

</script>

</body>
</html>
